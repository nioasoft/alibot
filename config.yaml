telegram:
  source_groups:
    - "@DilimShavimA"
    - "@DesignYourHomeWithAli"
    - "@aliexpresszolisrael"
    - "@aliexpressmuzarim"
    - "@https1_Onlineshopping"
    - "@OfficialKBT"
    - "@IsraelSmartBuy"

  target_groups:
    default: "@hadilimshelisrael"

  channel_link: "https://t.me/hadilimshelisrael"

  admin_chat: "me"

openai:
  model: "gpt-4o-mini"

publishing:
  min_delay_seconds: 300
  max_delay_seconds: 600
  max_posts_per_hour: 4
  quiet_hours_start: 23
  quiet_hours_end: 7
  hot_products_interval_hours: 4
  hot_products_per_run: 3

dedup:
  window_hours: 24
  image_hash_threshold: 5

watermark:
  logo_path: "assets/logo.png"
  position: "bottom-right"
  opacity: 0.4
  scale: 0.15

parser:
  min_message_length: 20
  supported_domains:
    - "aliexpress.com"
    - "s.click.aliexpress.com"
    - "a.aliexpress.com"

dashboard:
  port: 8080
  auto_refresh_seconds: 30

aliexpress:
  # Configured via environment variables
  # ALIEXPRESS_APP_KEY, ALIEXPRESS_APP_SECRET, ALIEXPRESS_TRACKING_ID

whatsapp:
  service_url: "http://localhost:3001"
  group_jid: ""  # Set after first WhatsApp connection, GET /groups to find it
